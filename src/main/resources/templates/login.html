<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px; border-radius: 15px;">
    <h2 class="text-center text-primary mb-4">Authentification</h2>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-bold">Nom d'utilisateur</label>
            <input type="text" name="username" class="form-control" placeholder="Entrez votre pseudo" required autofocus />
        </div>

        <div class="mb-4">
            <label class="form-label fw-bold">Mot de passe</label>
            <input type="password" name="password" class="form-control" placeholder="Entrez votre mot de passe" required />
        </div>

        <button type="submit" class="btn btn-primary w-100 fs-5">Se connecter</button>
    </form>
</div>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark mb-5 shadow-sm">
    <div class="container">
        <span class="navbar-brand mb-0 h1">🛡️ Mon App Sécurisée</span>

        <form th:action="@{/logout}" method="post" class="d-flex m-0">
            <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Se déconnecter</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm border-0">
        <div class="card-body p-5">
            <h1 class="card-title text-primary mb-4">Bienvenue sur l'application !</h1>

            <div class="alert alert-success fs-5">
                👋 Bonjour, <strong sec:authentication="name">Utilisateur</strong> !
            </div>

            <p class="fs-5">
                Vos rôles : <span class="badge bg-secondary fs-6" sec:authentication="principal.authorities"></span>
            </p>

            <hr class="my-4">

            <h4 class="mb-3 text-secondary">Testez vos accès :</h4>
            <div class="d-flex gap-3 mt-3">
                <a th:href="@{/user/dashboard}" class="btn btn-info text-white px-4">🧑‍💻 Espace Utilisateur</a>

                <a th:href="@{/admin/dashboard}" class="btn btn-warning px-4" sec:authorize="hasRole('ADMIN')">⚙️ Espace Administrateur</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
